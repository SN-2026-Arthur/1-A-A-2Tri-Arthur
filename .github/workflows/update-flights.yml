name: Pipeline SIROS → Supabase

on:
  schedule:
    # 4x por dia: 06h, 09h, 12h e 18h (Brasilia = UTC-3)
    - cron: '0 9,12,15,21 * * *'
  workflow_dispatch:

jobs:
  fetch-and-insert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests supabase

      - name: Injetar variaveis no painel HTML
        run: sed -i "s|%%SUPABASE_ANON_KEY%%|${{ secrets.SUPABASE_SERVICE_KEY }}|g" index.html

      - name: Buscar SIROS e inserir no Supabase
        run: python scripts/fetch_flights.py
        env:
          AIRPORTS:             ${{ vars.AIRPORTS || 'SBCA,SBCT,SBLO,SBMG,SBFI,SBFL,SBJV,SBNF,SBPA,SBCX,SBGR,SBSP,SBKP,SBRP,SBGL,SBRJ,SBCF,SBUL,SBMK,SBVT,SBBR,SBGO,SBCY,SBCG,SBSV,SBFZ,SBRF,SBSL,SBTE,SBJP,SBMO,SBSE,SBSG,SBEG,SBBE,SBSN,SBMQ,SBBV,SBPV,SBRB,SBPJ' }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Sem etapa de commit — os dados vao direto ao Supabase
      # O repositorio so guarda o codigo, nao os dados
